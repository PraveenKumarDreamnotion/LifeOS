name: release
on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # required to create the release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run fetch:model # STT model is not committed to git; fetch it before packaging
      # Builds the NSIS installer + portable exe and uploads them to a draft GitHub Release.
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate checksums
        run: |
          Get-FileHash release/*.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } |
            Out-File -Encoding utf8 release/SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/SHA256SUMS.txt
